<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua → RBXMX / ANIM</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f5f5f5;
}

.container{
    width:90%;
    max-width:500px;
}

h1{
    text-align:center;
}

input,
select,
button{
    width:100%;
    box-sizing:border-box;
    margin-bottom:12px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    border:none;
    background:#2d6cdf;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2458b8;
}

progress{
    width:100%;
    height:25px;
}

#status{
    text-align:center;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>Lua → RBXMX / ANIM</h1>

<form id="uploadForm">

<input
    type="file"
    name="files"
    accept=".lua"
    multiple
    required>

<select name="format">
    <option value="rbxmx">RBXMX</option>
    <option value="anim">ANIM</option>
</select>

<button type="submit">
    Converter
</button>

</form>

<progress id="progress" value="0" max="100"></progress>

<div id="status">0%</div>

</div>

<script>
const form = document.getElementById("uploadForm");
const progress = document.getElementById("progress");
const statusText = document.getElementById("status");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = new FormData(form);

    const xhr = new XMLHttpRequest();

    xhr.open("POST", "/convert");

    xhr.upload.onprogress = (e) => {
        if (!e.lengthComputable) return;

        const percent = Math.round(
            (e.loaded / e.total) * 50
        );

        progress.value = percent;
        statusText.innerText = percent + "%";
    };

    xhr.responseType = "blob";

    xhr.onload = () => {
        progress.value = 100;
        statusText.innerText = "100%";

        const blob = xhr.response;

        const disposition =
            xhr.getResponseHeader(
                "Content-Disposition"
            );

        let filename = "download";

        if (disposition) {
            const match =
                disposition.match(
                    /filename="?([^"]+)"?/
                );

            if (match) {
                filename = match[1];
            }
        }

        const url =
            window.URL.createObjectURL(blob);

        const a =
            document.createElement("a");

        a.href = url;
        a.download = filename;
        a.click();

        URL.revokeObjectURL(url);
    };

    xhr.send(data);
});
</script>

</body>
</html>
