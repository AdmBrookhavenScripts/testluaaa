<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Lua → RBXMX / ANIM</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f5f5f5;
}

.container{
    width:90%;
    max-width:500px;
}

h1{
    text-align:center;
}

.tabs{
    display:flex;
    gap:8px;
    margin-bottom:12px;
}

.tab{
    flex:1;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    background:#ddd;
}

.tab.active{
    background:#2d6cdf;
    color:white;
}

input,
select,
button{
    width:100%;
    box-sizing:border-box;
    margin-bottom:12px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    border:none;
    background:#2d6cdf;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2458b8;
}

progress{
    width:100%;
    height:25px;
    display:none;
}

#status{
    text-align:center;
    margin-top:10px;
}

.animCard{
    background:white;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ddd;
    word-break:break-word;
}

#animResults{
    margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>Lua → RBXMX / ANIM</h1>

<div class="tabs">

<button
class="tab active"
data-tab="convert">
Converter
</button>

<button
class="tab"
data-tab="anim">
Check .anim Time
</button>

</div>

<div id="convertTab">

<form id="uploadForm">

<input
type="file"
name="files"
accept=".lua,.rbxm,.rbxmx"
multiple
required>

<select name="format">

<option value="rbxmx">
RBXMX
</option>

<option value="anim">
ANIM
</option>

</select>

<button type="submit">
Converter
</button>

</form>

<progress
id="progress"
value="0"
max="100">
</progress>

<div id="status">
0%
</div>

</div>

<div
id="animTab"
style="display:none">

<form id="animForm">

<input
type="file"
name="files"
accept=".anim"
multiple
required>

<button type="submit">
Check Duration
</button>

</form>

<div id="animResults"></div>

</div>

</div>

<script>

const form =
document.getElementById(
    "uploadForm"
);

const progress =
document.getElementById(
    "progress"
);

const statusText =
document.getElementById(
    "status"
);

form.addEventListener(
    "submit",
    async (e)=>{

        e.preventDefault();
        progress.style.display = "block";
        progress.value = 0;
        statusText.innerText = "0%";

        const data =
            new FormData(form);

        const xhr =
            new XMLHttpRequest();

        xhr.open(
            "POST",
            "/convert"
        );

        xhr.upload.onprogress =
        (e)=>{

            if(
                !e.lengthComputable
            ) return;

            const percent =
                Math.round(
                    (
                        e.loaded /
                        e.total
                    ) * 50
                );

            progress.value =
                percent;

            statusText.innerText =
                percent + "%";
        };

        xhr.responseType =
            "blob";

        xhr.onload = ()=>{

            if(
                xhr.status !== 200
            ){

                const reader =
                    new FileReader();

                reader.onload =
                ()=>{

                    alert(
                        reader.result
                    );

                    progress.value =
                        0;

                    statusText.innerText = "";
                    progress.style.display = "none";
                };

                reader.readAsText(
                    xhr.response
                );

                return;
            }

            progress.value =
                100;

            statusText.innerText =
                "100%";

            const blob =
                xhr.response;

            const disposition =
                xhr.getResponseHeader(
                    "Content-Disposition"
                );

            let filename =
                "download";

            if(disposition){

                const match =
                    disposition.match(
                        /filename="?([^"]+)"?/
                    );

                if(match)
                    filename =
                        match[1];
            }

            const url =
                URL.createObjectURL(
                    blob
                );

            const a =
                document.createElement(
                    "a"
                );

            a.href = url;
            a.download =
                filename;

            a.click();

            URL.revokeObjectURL(
                url
            );

            setTimeout(()=>{

            progress.value = 0;
            statusText.innerText = "";
            progress.style.display = "none";

            },800);
        };

        xhr.send(data);
    }
);

const tabs =
document.querySelectorAll(
    ".tab"
);

const convertTab =
document.getElementById(
    "convertTab"
);

const animTab =
document.getElementById(
    "animTab"
);

tabs.forEach(btn=>{

    btn.addEventListener(
        "click",
        ()=>{

            tabs.forEach(
                t=>
                t.classList.remove(
                    "active"
                )
            );

            btn.classList.add(
                "active"
            );

            if(
                btn.dataset.tab
                ===
                "convert"
            ){

                convertTab.style.display =
                    "block";

                animTab.style.display =
                    "none";

            }else{

                convertTab.style.display =
                    "none";

                animTab.style.display =
                    "block";
            }
        }
    );
});

const animForm =
document.getElementById(
    "animForm"
);

const animResults =
document.getElementById(
    "animResults"
);

animForm.addEventListener(
    "submit",
    async (e)=>{

        e.preventDefault();

        const data =
            new FormData(
                animForm
            );

        animResults.innerHTML =
            "Loading...";

        try{

            const res =
                await fetch(
                    "/anim-info",
                    {
                        method:"POST",
                        body:data
                    }
                );

            if(!res.ok){

                alert(
                    await res.text()
                );

                animResults.innerHTML =
                    "";

                return;
            }

            const json =
                await res.json();

            animResults.innerHTML =
                "";

            json.forEach(
                anim=>{

                    animResults.innerHTML += `
<div class="animCard">
<b>${anim.file}</b>
<br><br>
Name:
${anim.name}
<br>
Duration:
${anim.duration}
</div>
`;
                }
            );

        }catch(err){

            alert(
                err.toString()
            );

            animResults.innerHTML =
                "";
        }
    }
);

</script>

</body>
</html>
